	<script type="text/javascript">
		resetMenu();
		function call(data) {
			$("#stockTable").find(".dataTr").remove();
	    	var index = 0;
	    	var table = "";
	    	$.each(data, function(index, stock) {
	    		var tr = "<tr class='dataTr'>";
	    		tr += "<td>" + (index+1) + "</td><td>" + stock.stockId + "</td><td>" + stock.stockName + "</td>" + 
	    			"<td>" + stock.open + "</td>" +
	    			"<td>" + stock.high + "</td>" +
	    			"<td>" + stock.low + "</td>" +
	    			"<td>" + stock.close + "</td>";
	    		tr += "</tr>";
	        	$("#stockTable").append(tr);
	    		
	    		//table += "<td><button onclick='printChart(\"" + dateType + "\", \"" + stock.stockId + "\")'>" + stock.stockId + "-" + stock.stockName + "</button></td>";
	    		index++;
	        });
	    	$('#tab1').click();
		}
		//查詢多空股票
		function findStocks() {
			if($('input[name="dateType"]:checked').length == 0) {
				alert("日線 周線至少選擇一種");
				return ;
			}
			
			var url = 'https://stock.bignoodle.net/StockServer/stock/findStockWithGap?callback=call';
			//var url = 'http://localhost:8080/web/stock/findStockLongTerm';
			
			$.ajax({
		        url: url,
		        dataType: "jsonp",
		        data: {
		        	'dateType': $("input[name=dateType]:checked").val()
		        },
		        jsonpCallback: "call",
		        error: function (request,error) {
		            alert('發生錯誤，請晚點再試!'+error);
		        }
		    });
		}
		</script>
