	<script type="text/javascript">
	resetMenu();
	initIds('ids');

		function printColor(price, closePrice) {
			if(price > closePrice) {
				return "<font color=red>"+price+"</font>";
			}
			else if(price < closePrice) {
				return "<font color=green>"+price+"</font>";
			}
			
			return price;
		}
		var dataNumber = 20;
		function printChart(dateType, id) {
			var url = 'https://stock.bignoodle.net/StockServer/stock/queryStockTurnData?si=' + id.toUpperCase() + '&dt=' + dateType + '&dn=' + dataNumber + '&callback=call';
			//var url = 'http://localhost:8080/web/stock/queryStockTurnData?si=' + $("#ids").val().toUpperCase() + '&dt=' + dateType + '&dn=20&callback=call';
			
			return $.ajax({
		        url: url,
		        dataType: "jsonp",
		        jsonpCallback: "call",
		        success: function (data) {

		        	var closePrice = data['close'];
		            $("#close").text(closePrice);
		            
		            //清空table
		            $("#" + dateType + "levelTable").find(".dataTr").remove();
		            var charts = data['charts'];
		            $.each(charts, function(index, value) {
		            	var tr = "<tr class='dataTr'>";
		            	tr += "<td>" + Highcharts.dateFormat('%Y/%m/%d', value.dataTime) + "</td>";
		            	tr += "<td>" + value.open + "</td>";
		            	tr += "<td>" + value.high + "</td>";
		            	tr += "<td>" + value.low + "</td>";
		            	tr += "<td>" + value.close + "</td>";
		            	tr += "<td>" + (value.ma3!=null?value.ma3:"") + "</td>";
		            	tr += "<td>" + (value.ma10!=null?value.ma10:"") + "</td>";
		            	tr += "<td>" + (value.ma21!=null?value.ma21:"") + "</td>";
		            	tr += "<td>" + printColor(value.level1, closePrice) + "</td>";
		            	tr += "<td>" + printColor(value.level2, closePrice) + "</td>";
		            	tr += "<td>" + printColor(value.level3, closePrice) + "</td>";
		            	tr += "<td>" + printColor(value.level4, closePrice) + "</td>";
		            	tr += "<td>" + printColor(value.level5, closePrice) + "</td>";
		            	tr += "<td>" + printColor(value.level6, closePrice) + "</td>";
		            	tr += "<td>" + printColor(value.level7, closePrice) + "</td>";
		            	tr += "<td>" + printColor(value.level8, closePrice) + "</td>";
		            	tr += "<td>" + value.level9 + "</td>";
		            	tr += "</tr>";
		            	//只出現最後4筆，而且最前面三筆會被排除
		            	if(index >= dataNumber-4-3) {
		            		$("#" + dateType + "levelTable").append(tr);
		            	}
		            	
		            });
		            
		            //C權證資料
		            if(dateType == 'D') {
			            $("#CWantsTable").find(".dataTr").remove();
			            var charts = data['cwants'];
			            $.each(charts, function(index, jsonvalue) {
			            	var value = JSON.parse(jsonvalue.json);
			            	var iom = value.iom;
			            	var tr = "<tr class='dataTr'>";
			            	tr += "<td>" + value.callput + "</td>";
			            	tr += "<td>" + value.scode + "</td>";
			            	tr += "<td>" + value.sname + "</td>";
			            	tr += "<td>" + value.bid + "</td>";
			            	tr += "<td>" + value.ask + "</td>";
			            	tr += "<td>" + value.x + "</td>";
			            	tr += "<td>" + iom + "</td>";
			            	tr += "<td>" + value.days + "</td>";
			            	tr += "<td>" + value.multi + "</td>";
			            	tr += "<td>" + value.lvr + "</td>";
			            	tr += "<td>" + value.biv + "</td>";
			            	tr += "<td>" + value.siv + "</td>";
			            	tr += "<td>" + value.bepr_ask + "</td>";
			            	tr += "</tr>";
			            	
			            	$("#CWantsTable").append(tr);
			            	
			            });
			            
			            $("#PWantsTable").find(".dataTr").remove();
			            var charts = data['pwants'];
			            $.each(charts, function(index, jsonvalue) {
			            	var value = JSON.parse(jsonvalue.json);
			            	var iom = value.iom;
			            	var tr = "<tr class='dataTr'>";
			            	tr += "<td>" + value.callput + "</td>";
			            	tr += "<td>" + value.scode + "</td>";
			            	tr += "<td>" + value.sname + "</td>";
			            	tr += "<td>" + value.bid + "</td>";
			            	tr += "<td>" + value.ask + "</td>";
			            	tr += "<td>" + value.x + "</td>";
			            	tr += "<td>" + iom + "</td>";
			            	tr += "<td>" + value.days + "</td>";
			            	tr += "<td>" + value.multi + "</td>";
			            	tr += "<td>" + value.lvr + "</td>";
			            	tr += "<td>" + value.biv + "</td>";
			            	tr += "<td>" + value.siv + "</td>";
			            	tr += "<td>" + value.bepr_ask + "</td>";
			            	tr += "</tr>";
			            	
			            	$("#PWantsTable").append(tr);
			            	
			            });
		            }
		            
		            for(i=1;i<=15;i++) {
		            	$("#" + dateType + i).html(data[dateType + i]);
		            }
		            $("#" + dateType + 17).html(data[dateType + 17]);
		            var text16 = data[dateType + 16] + "<br/>上方 " + data[dateType + 18] + "<br/>下方 " + data[dateType + 19];
		            $("#" + dateType + 16).html(text16);
		        },
		        error: function (request,error) {
		            alert('發生錯誤，請晚點再試!'+error);
		        },
		        complete: function (request,textStatus) {
		        	$('#tab4').click();
		        }
		    });
		}
		
		var dateTypeArray = ["D", "W", "M"];
		function printChartAll(index, id) {
			//console.log("printChartAll " + dateTypeArray[index]);
			return printChart(dateTypeArray[index], id).then(function(data){
		        if (index >= dateTypeArray.length) {
		            return;
		        } else {
		        	if (index+1 >= dateTypeArray.length) {
		        		return;
		        	}
		            return printChartAll(index + 1, id);
		        }
		    });
			
		}


		function queryChart() {
			if($("#ids").val() == '') {
				alert('請輸入要查詢的股票代碼');
				return;
			}
			printChartAll(0, $("#ids").val());
		}
		function queryChart0() {
			printChartAll(0, '0000');
		}
		function queryChartf(id) {
			printChartAll(0, id);
		}
		</script>
