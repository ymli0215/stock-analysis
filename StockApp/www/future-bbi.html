                <div class="row">
                    <div class="col-lg-12">
                    	<div class="panel-default">
                    		<div class="form-group">
								<label>更新時間(秒) : </label>
								<input class="form-control" id="refreshTime" value="120" size="10">
							</div>
							<div class="form-group">
								<label>合約 : </label>

									<input type="radio" name="monthType" id="current" value="1" checked>本月

								<label class="radio-inline">

							<div class="form-group">
								<label>開始抓取 : </label>
								<label class="radio-inline">
									<input type="radio" name="switch" id="on" value="on">on
								</label>
								<label class="radio-inline">
									<input type="radio" name="switch" id="off" value="off" checked>off
								</label>
							</div>
							<div class="table-responsive">
                                <table id="table1" class="table table-striped table-bordered table-hover">
                                    <thead>
                                        <tr class="headerTr">
								        <td width="8%">時間</td><td width="10%">買賣張數</td><td width="10%">買賣筆數</td>
								        <td width="8%">多空</td><td width="8%">均買</td><td width="8%">均賣</td>

    <!-- highcharts JavaScript -->
    <script src="vendor/highcharts/highstock.js"></script>
    <script src="vendor/highcharts/exporting.js"></script>

	<script>
	resetMenu();
	
	var timeoutSch;
	var queryStart = 0;//預設為結束


	function queryData() {
		
		var contractMonthType = 1;
		if ( $("#next").prop('checked') ) {
			contractMonthType = 2;
		}
	    var url = 'https://stock.bignoodle.net/StockServer/futures/querybbi?type=1&contractMonthType=' + contractMonthType;     
	     
	    if(queryStart == 1) {
	  	  	//loading('show', 1);
		    $.ajax({
		        url: url,
		        dataType: "jsonp",
		        jsonpCallback: "jsonp",
		        success: function (result) {
		            var tr = "<tr>";
		            $.each(result, function (index, value) {
		            	tr += "<td>" + value + "</td>";
		            });
		            tr += "</tr>";
		            
	            	$("#tbody").append(tr);
		            
		            if(queryStart == 1) {
		            	timeoutSch = setTimeout(queryData, $("#refreshTime").val()*1000)
		            }
		        },
		        error: function (request,error) {
		            alert('發生錯誤，請晚點再試!'+error);
		        },
		        complete: function (request,textStatus) {
		        	//loading('hide', 1000);
		        }
		    });
	    }
	}
	
	$( document ).ready(function() {
		$(document).on('change', 'input[name="switch"]', function(){
			if($("#on").prop('checked')) {
				queryStart = 1;
			}
			else {
				queryStart = 0;
	    		clearTimeout(timeoutSch);
			}

	        if(queryStart == 1) {
	        	queryData();
	        }  
	    });
	});
	</script>
