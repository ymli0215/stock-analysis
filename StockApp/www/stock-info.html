	<script type="text/javascript">
		resetMenu();
		initIds('ids');
		
		function go(position) {
			var index = $("#ids").prop('selectedIndex');
			var max = $("#ids option").length;
			if(index + position <= 1) {
				index = 1; 
			}
			else if(index + position >= max) {
				index = max-1;
			}
			else {
				index = index + position;
			}
			var id = $('#ids option:eq(' + index + ')').val();
			$("#ids").val(id);
			$('#ids').selectpicker('refresh')
			printChartAll(0, id);
		}
		
		
		function printChart(dateType, id) {
			var url = 'https://stock.bignoodle.net/StockServer/stock/queryStockData?si=' + id.toUpperCase() + '&dt=' + dateType + '&dn=130&callback=call';
			//var url = 'http://localhost:8080/web/stock/queryStockTurnData?si=' + id.toUpperCase() + '&dt=' + dateType + '&dn=20&callback=call';
			
			return $.ajax({
		        url: url,
		        dataType: "jsonp",
		        jsonpCallback: "call",
		        success: function (data) {
		            // create the chart
		          var ma3 = new Array();
		          var ma10 = new Array();
		          var ma21 = new Array();
		          var ma55 = new Array();
		          var ma144 = new Array();
		          var ma233 = new Array();
		          for(var i=0;i<data.charts.length;i++) {
		          	if(data.charts[i].ma3>0)
		          		ma3.push([data.charts[i].dataTime, data.charts[i].ma3]);
		          	if(data.charts[i].ma10>0)
		          		ma10.push([data.charts[i].dataTime, data.charts[i].ma10]);
		          	if(data.charts[i].ma21>0)
		          		ma21.push([data.charts[i].dataTime, data.charts[i].ma21]);
		          	if(data.charts[i].ma55>0)
		          		ma55.push([data.charts[i].dataTime, data.charts[i].ma55]);
		          	if(data.charts[i].ma144>0)
		          		ma144.push([data.charts[i].dataTime, data.charts[i].ma144]);
		          	if(data.charts[i].ma233>0)
		          		ma233.push([data.charts[i].dataTime, data.charts[i].ma233]);
		          }
		          
		          
		          var ema3 = new Array();
		          var ema7 = new Array();
		          var ema13 = new Array();
		          var ema21 = new Array();
		          var ema53 = new Array();
		          var ema144 = new Array();
		          var ema233 = new Array();
		          for(var i=0;i<data.charts.length;i++) {
		          	if(data.charts[i].ema3>0)
		          		ema3.push([data.charts[i].dataTime, data.charts[i].ema3]);
		          	if(data.charts[i].ema7>0)
		          		ema7.push([data.charts[i].dataTime, data.charts[i].ema7]);
		          	if(data.charts[i].ema13>0)
		          		ema13.push([data.charts[i].dataTime, data.charts[i].ema13]);
		          	if(data.charts[i].ema21>0)
		          		ma21.push([data.charts[i].dataTime, data.charts[i].ema21]);
		          	if(data.charts[i].ema53>0)
		          		ema53.push([data.charts[i].dataTime, data.charts[i].ema53]);
		          	if(data.charts[i].ema144>0)
		          		ema144.push([data.charts[i].dataTime, data.charts[i].ema144]);
		          	if(data.charts[i].ema233>0)
		          		ema233.push([data.charts[i].dataTime, data.charts[i].ema233]);
		          }
		          
		          var seriesMAArray;
			        	seriesMAArray = [{
			                type : 'candlestick',
			                name : data['sname'],
			                data : data['sdata']
			            }, {
			                type: 'column',
			                name: 'Volume',
			                data: data['vols'],
			                yAxis: 1
			            }, {
			                name: '3ma',
			                data: ma3,
			                yAxis: 0
			            }, {
			                name: '10ma',
			                data: ma10,
			                yAxis: 0
			            }, {
			                name: '21ma',
			                data: ma21,
			                yAxis: 0
			            }, {
			                name: '55ma',
			                data: ma55,
			                yAxis: 0
			            }, {
			                name: '144ma',
			                data: ma144,
			                yAxis: 0
			            }, {
			                name: '233ma',
			                data: ma233,
			                yAxis: 0
			            }];
			            
			            
		          
		          var seriesEMAArray;
			        	seriesEMAArray = [{
			                type : 'candlestick',
			                name : data['sname'],
			                data : data['sdata']
			            }, {
			                type: 'column',
			                name: 'Volume',
			                data: data['vols'],
			                yAxis: 1
			            }, {
			                name: 'ema3',
			                data: ema3,
			                yAxis: 0
			            }, {
			                name: 'ema7',
			                data: ema7,
			                yAxis: 0
			            }, {
			                name: 'ema13',
			                data: ema13,
			                yAxis: 0
			            }, {
			                name: 'ema21',
			                data: ema21,
			                yAxis: 0
			            }, {
			                name: 'ema53',
			                data: ema53,
			                yAxis: 0
			            }, {
			                name: 'ema144',
			                data: ema144,
			                yAxis: 0
			            }, {
			                name: 'ema233',
			                data: ema233,
			                yAxis: 0
			            }];
			          
		          
		          
			        $('#' + dateType + 'container').highcharts('StockChart', {
			        	chart: {
			        		reflow: true,
			                height: 500
			            },
			            tooltip: {
		                	xDateFormat:'%Y-%m-%d',
		                	shared:true
			            },
			            colors: ['#058DC7', '#50B432', '#ED561B', '#CC7700', '#4f9ab7', '#64E572', 
			                     '#FF9655', '#FFF263', '#873322'],
			            plotOptions: {
			                candlestick: {
			                    color: '#005500',
			                    lineColor: '#005500',
			                    upColor: '#D52B00',
			                    upLineColor: '#D52B00'
			                },
			                column: {
			                    color: '#FF9900'
			                },
			                line: {
			                    lineWidth: 1,
			                    marker: { states: { hover: { enabled: false }, select: { enabled: false } } }
			                },
			                dataLabels: {
			                    enabled: false
			                }
			            },
			            rangeSelector : {
			                //selected : 1
			                //關閉左上方的zoom按鈕
			            	enabled: true,
			            	inputEnabled:false,
			            	buttonPosition: {
			            		align: 'right',
			            		x: 600,
			            		y: 0
			            	}
			            },
			            title : {
			                text : data['sname']
			            },
			            xAxis: {
					            type: 'datetime',
					            labels: {
										    format: '{value:%Y-%m-%d}'
										  }
					        },
			            yAxis: [{
			                labels: {
			                    align: 'left',
			                    formatter: function () {
							                return Highcharts.numberFormat(this.value,2);
							            }
			                },
			                height: '70%',
			                lineWidth: 2,
			                resize: {
			                    enabled: true
			                }
			            }, {
			                labels: {
			                    align: 'left',
			                    formatter: function () {
							                return Highcharts.numberFormat(this.value,0);
							            }
			                },
			                title: {
			                    text: 'Volume'
			                },
			                top: '70%',
			                height: '25%',
			                offset: 0,
			                lineWidth: 2
			            }],
			            series : seriesMAArray
			        });
		            
		            
		        },
		        error: function (request,error) {
		            alert('發生錯誤，請晚點再試!'+error);
		        },
		        complete: function (request,textStatus) {
		        	$('#tab1').click();
		        }
		    });
		}
		
var dateTypeArray = ["D", "W", "M"];
function printChartAll(index, id) {
	//console.log("printChartAll " + dateTypeArray[index]);
	return printChart(dateTypeArray[index], id).then(function(data){
        if (index >= dateTypeArray.length) {
            return;
        } else {
        	if (index+1 >= dateTypeArray.length) {
        		return;
        	}
            return printChartAll(index + 1, id);
        }
    });
	
}


function queryChart() {
	if($("#ids").val() == '') {
		alert('請輸入要查詢的股票代碼');
		return;
	}
	printChartAll(0, $("#ids").val());
}
function queryChart0() {
	printChartAll(0, '0000');
}
function queryChartf(id) {
	printChartAll(0, id);
}
