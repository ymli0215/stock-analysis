<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="">
<meta name="author" content="">

<title>SB Admin 2 - Bootstrap Admin Theme</title>

<!-- Bootstrap Core CSS -->
<link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

<!-- MetisMenu CSS -->
<link href="../vendor/metisMenu/metisMenu.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link href="../dist/css/sb-admin-2.css" rel="stylesheet">

<!-- Custom Fonts -->
<link href="../vendor/font-awesome/css/font-awesome.min.css"
	rel="stylesheet" type="text/css">

<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
<!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

</head>

<body>

	<div id="wrapper">
		<!-- Page Content -->
		<div id="page-wrapper">
			<div class="container-fluid">
				<div class="row">
					<div class="col-lg-12">
						<div id="myDiagramDiv"
							style="width: 800px; height: 600px; background-color: #DAE4E4;"></div>
					</div>
					<!-- /.col-lg-12 -->
				</div>
				<!-- /.row -->
			</div>
			<!-- /.container-fluid -->
		</div>
		<!-- /#page-wrapper -->

	</div>
	<!-- /#wrapper -->

	<!-- jQuery -->
	<script src="../vendor/jquery/jquery.min.js"></script>

	<!-- Bootstrap Core JavaScript -->
	<script src="../vendor/bootstrap/js/bootstrap.min.js"></script>

	<!-- Metis Menu Plugin JavaScript -->
	<script src="../vendor/metisMenu/metisMenu.min.js"></script>

	<!-- Custom Theme JavaScript -->
	<script src="../dist/js/sb-admin-2.js"></script>

	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/gojs/1.8.9/go-debug.js"></script>

	<script>
	function init() {
	    if (window.goSamples) goSamples();  // init for these samples -- you don't need to call this
	    var $ = go.GraphObject.make;  // for conciseness in defining templates

	    myDiagram =
	      $(go.Diagram, "myDiagramDiv",  // must name or refer to the DIV HTML element
	        {
	          initialContentAlignment: go.Spot.Center,
	          allowDelete: false,
	          allowCopy: false,
	          layout: $(go.ForceDirectedLayout),
	          "undoManager.isEnabled": true
	        });

	    // define several shared Brushes
	    var bluegrad = $(go.Brush, "Linear", { 0: "rgb(150, 150, 250)", 0.5: "rgb(86, 86, 186)", 1: "rgb(86, 86, 186)" });
	    var greengrad = $(go.Brush, "Linear", { 0: "rgb(158, 209, 159)", 1: "rgb(67, 101, 56)" });
	    var redgrad = $(go.Brush, "Linear", { 0: "rgb(206, 106, 100)", 1: "rgb(180, 56, 50)" });
	    var yellowgrad = $(go.Brush, "Linear", { 0: "rgb(254, 221, 50)", 1: "rgb(254, 182, 50)" });
	    var lightgrad = $(go.Brush, "Linear", { 1: "#E6E6FA", 0: "#FFFAF0" });

	    // the template for each attribute in a node's array of item data
	    var itemTempl =
	      $(go.Panel, "Horizontal",
	        $(go.Shape,
	          { desiredSize: new go.Size(0, 0) },
	          new go.Binding("figure", "figure"),
	          new go.Binding("fill", "color")),
	        $(go.TextBlock,
	          { stroke: "#333333",
	            font: "bold 14px sans-serif" },
	          new go.Binding("text", "name"))
	      );

	    // define the Node template, representing an entity
	    myDiagram.nodeTemplate =
	      $(go.Node, "Auto",  // the whole node panel
	        { selectionAdorned: true,
	          resizable: true,
	          layoutConditions: go.Part.LayoutStandard & ~go.Part.LayoutNodeSized,
	          fromSpot: go.Spot.AllSides,
	          toSpot: go.Spot.AllSides,
	          isShadowed: true,
	          shadowColor: "#C5C1AA" },
	        new go.Binding("location", "location").makeTwoWay(),
	        // whenever the PanelExpanderButton changes the visible property of the "LIST" panel,
	        // clear out any desiredSize set by the ResizingTool.
	        new go.Binding("desiredSize", "visible", function(v) { return new go.Size(NaN, NaN); }).ofObject("LIST"),
	        // define the node's outer shape, which will surround the Table
	        $(go.Shape, "Rectangle",
	          { fill: lightgrad, stroke: "#756875", strokeWidth: 3 }),
	        $(go.Panel, "Table",
	          { margin: 8, stretch: go.GraphObject.Fill },
	          $(go.RowColumnDefinition, { row: 0, sizing: go.RowColumnDefinition.None }),
	          // the table header
	          $(go.TextBlock,
	            {
	              row: 0, alignment: go.Spot.Center,
	              margin: new go.Margin(0, 14, 0, 2),  // leave room for Button
	              font: "bold 16px sans-serif"
	            },
	            new go.Binding("text", "key")),
	          // the collapse/expand button
	          $("PanelExpanderButton", "LIST",  // the name of the element whose visibility this button toggles
	            { row: 0, alignment: go.Spot.TopRight }),
	          // the list of Panels, each showing an attribute
	          $(go.Panel, "Vertical",
	            {
	              name: "LIST",
	              row: 1,
	              padding: 3,
	              alignment: go.Spot.TopLeft,
	              defaultAlignment: go.Spot.Left,
	              stretch: go.GraphObject.Horizontal,
	              itemTemplate: itemTempl
	            },
	            new go.Binding("itemArray", "items"))
	        )  // end Table Panel
	      );  // end Node

	    // define the Link template, representing a relationship
	    myDiagram.linkTemplate =
	      $(go.Link,  // the whole link panel
	        {
	          selectionAdorned: true,
	          layerName: "Foreground",
	          reshapable: true,
	          routing: go.Link.AvoidsNodes,
	          corner: 5,
	          curve: go.Link.JumpOver
	        },
	        $(go.Shape,  // the link shape
	          { stroke: "#303B45", strokeWidth: 2.5 }),
	        $(go.TextBlock,  // the "from" label
	          {
	            textAlign: "center",
	            font: "bold 14px sans-serif",
	            stroke: "#1967B3",
	            segmentIndex: 0,
	            segmentOffset: new go.Point(NaN, NaN),
	            segmentOrientation: go.Link.OrientUpright
	          },
	          new go.Binding("text", "text")),
	        $(go.TextBlock,  // the "to" label
	          {
	            textAlign: "center",
	            font: "bold 14px sans-serif",
	            stroke: "#1967B3",
	            segmentIndex: -1,
	            segmentOffset: new go.Point(NaN, NaN),
	            segmentOrientation: go.Link.OrientUpright
	          },
	          new go.Binding("text", "toText"))
	      );

	    // create the model for the E-R diagram
	    var nodeDataArray = [
	      { key: "Products",
	        items: [ { name: "ProductID", iskey: true},
	                 { name: "ProductName", iskey: false},
	                 { name: "SupplierID", iskey: false},
	                 { name: "CategoryID", iskey: false} ] },
	      { key: "Suppliers",
	        items: [ { name: "SupplierID", iskey: true},
	                 { name: "CompanyName", iskey: false},
	                 { name: "ContactName", iskey: false},
	                 { name: "Address", iskey: false} ] },
	      { key: "Categories",
	        items: [ { name: "CategoryID", iskey: true},
	                 { name: "CategoryName", iskey: false},
	                 { name: "Description", iskey: false},
	                 { name: "Picture", iskey: false} ] },
	      { key: "Order Details",
	        items: [ { name: "OrderID", iskey: true},
	                 { name: "ProductID", iskey: true},
	                 { name: "UnitPrice", iskey: false},
	                 { name: "Quantity", iskey: false},
	                 { name: "Discount", iskey: false} ] },
     	  { key: "Order Details2",
   	        items: [ { name: "OrderID2", iskey: true},
   	                 { name: "ProductID", iskey: true},
   	                 { name: "UnitPrice", iskey: false},
   	                 { name: "Quantity", iskey: false},
   	                 { name: "Discount", iskey: false} ] },
  	      { key: "Order Details1",
    	        items: [ { name: "OrderID1", iskey: true},
    	                 { name: "ProductID", iskey: true},
    	                 { name: "UnitPrice", iskey: false},
    	                 { name: "Quantity", iskey: false},
    	                 { name: "Discount", iskey: false} ] }
	    ];
	    var linkDataArray = [
	      { from: "Products", to: "Suppliers"},
	      { from: "Products", to: "Categories"},
	      { from: "Order Details", to: "Products"},
	      { from: "Order Details1", to: "Categories"},
	      { from: "Order Details1", to: "Products"},
	      { from: "Order Details2", to: "Categories"},
	      { from: "Order Details2", to: "Products"},
	      { from: "Order Details2", to: "Suppliers"},
	      { from: "Order Details2", to: "Order Details"}
	    ];
	    myDiagram.model = new go.GraphLinksModel(nodeDataArray, linkDataArray);
	  }
	  init();
	</script>
</body>

</html>
