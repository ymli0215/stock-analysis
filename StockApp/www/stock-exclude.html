	<script type="text/javascript">
		resetMenu();

		function queryData() {
			
		    var url = 'https://stock.bignoodle.net/StockServer/stockExclude/queryExcludeData?callback=jsonp';     
		    //var url = 'http://localhost:8080/web/stock/queryExcludeData?callback=jsonp';
		     
		    $.ajax({
		        url: url,
		        dataType: "jsonp",
		        jsonpCallback: "jsonp",
		        success: function (result) {
		        	$(".trc").remove();
		        	$.each(result, function(idx, obj) {
		        		var date = new Date(obj.excludeDate);
		        		var style = '';
		        		if(obj.excludeDividendRate >= 5) {
		        			style = " style = ' background-color:#fff700' ";
		        		}

		        		var tr = "<tr class='trc' " + style + ">";
		        		tr += "<td>" + obj.id.stockId + "</td>";
		        		tr += "<td>" + obj.stockName + "</td>";
		        		tr += "<td>" + date.getFullYear() + "/" + (date.getMonth() + 1) + '/' + date.getDate() + "</td>";
		        		tr += "<td>" + obj.price + "</td>";
		        		tr += "<td>" + obj.afterExPrice + "</td>";
		        		tr += "<td>" + obj.excludeDividend + "</td>";
		        		tr += "<td>" + obj.excludeRight + "</td>";
		        		tr += "<td>" + obj.excludeDividendRate + "</td>";
		        		tr += "<td>" + obj.excludeRightRate + "</td>";
		        		//tr += "<td>" + obj.cashYields + "</td>";
		        		//tr += "<td>" + obj.yields + "</td>";
		        		tr += "<td>" + obj.rdRate + "</td>";
		        		tr += "<td>" + obj.rdGoldRate + "</td>";
		        		tr += "<td>" + obj.futures + "</td>";
		        		tr += "<td>" + obj.wants + "</td>";
		        		
		                tr += "</tr>";
		                $("#table1").append(tr);
		        	});
		        },
		        error: function (request,error) {
		            alert('發生錯誤，請晚點再試!'+error);
		        },
		        complete: function (request,textStatus) {
		        }
		    });
		}

		</script>
