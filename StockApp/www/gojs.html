<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>SB Admin 2 - Bootstrap Admin Theme</title>

    <!-- Bootstrap Core CSS -->
    <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- MetisMenu CSS -->
    <link href="../vendor/metisMenu/metisMenu.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="../dist/css/sb-admin-2.css" rel="stylesheet">

    <!-- Custom Fonts -->
    <link href="../vendor/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

</head>

<body>

    <div id="wrapper">
        <!-- Page Content -->
        <div id="page-wrapper">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-12">
                        <div id="myDiagramDiv" style="width:800px; height:600px; background-color: #DAE4E4;"></div>
                    </div>
                    <!-- /.col-lg-12 -->
                </div>
                <!-- /.row -->
            </div>
            <!-- /.container-fluid -->
        </div>
        <!-- /#page-wrapper -->

    </div>
    <!-- /#wrapper -->

    <!-- jQuery -->
    <script src="../vendor/jquery/jquery.min.js"></script>

    <!-- Bootstrap Core JavaScript -->
    <script src="../vendor/bootstrap/js/bootstrap.min.js"></script>

    <!-- Metis Menu Plugin JavaScript -->
    <script src="../vendor/metisMenu/metisMenu.min.js"></script>

    <!-- Custom Theme JavaScript -->
    <script src="../dist/js/sb-admin-2.js"></script>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/gojs/1.8.9/go-debug.js"></script>
	
	<script>
	var gojs = go.GraphObject.make;

	var myDiagram =
	  gojs(go.Diagram, "myDiagramDiv",
	    {
	      initialContentAlignment: go.Spot.Center, // center Diagram contents
	      "undoManager.isEnabled": true, // enable Ctrl-Z to undo and Ctrl-Y to redo
	      layout: gojs(go.TreeLayout, // specify a Diagram.layout that arranges trees
	                { angle: 90, layerSpacing: 35 })
	    });

	// the template we defined earlier
	myDiagram.nodeTemplate =
	  gojs(go.Node, "Vertical",
	    { background: "#44CCFF" },
	    gojs(go.TextBlock, "Default Text",
	      { margin: 12, stroke: "white", font: "bold 16px sans-serif" },
	      new go.Binding("text", "caseno")),
	    gojs(go.TextBlock, "Default Text",
	      { margin: 12, stroke: "white", font: "bold 16px sans-serif" },
	      new go.Binding("text", "applydate"))
	  );

	// define a Link template that routes orthogonally, with no arrowhead
	myDiagram.linkTemplate =
	  gojs(go.Link,
	    { routing: go.Link.Orthogonal, corner: 5 },
	    gojs(go.Shape, { strokeWidth: 3, stroke: "#555" })); // the link shape

	var model = gojs(go.TreeModel);
	model.nodeDataArray =
	[
	  { key: "1",              caseno: "Don Meow",   applydate: "2011/1/1" },
	  { key: "2", parent: "1", caseno: "Demeter",    applydate: "2011/1/1" },
	  { key: "3", parent: "1", caseno: "Copricat",   applydate: "2011/1/1" },
	  { key: "4", parent: "3", caseno: "Jellylorum", applydate: "2011/1/1" },
	  { key: "5", parent: "3", caseno: "Alonzo",     applydate: "2011/1/1" },
	  { key: "6", parent: "2", caseno: "Munkustrap", applydate: "2011/1/1" },
	  { key: "6", parent: "3", caseno: "Munkustrap", applydate: "2011/1/1" }
	];
	myDiagram.model = model;
	    
	</script>
</body>

</html>
