<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>SB Admin 2 - Bootstrap Admin Theme</title>

    <!-- Bootstrap Core CSS -->
    <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- MetisMenu CSS -->
    <link href="../vendor/metisMenu/metisMenu.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="../dist/css/sb-admin-2.css" rel="stylesheet">

    <!-- Custom Fonts -->
    <link href="../vendor/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->

    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>

<body>

    <div id="wrapper">
        <!-- Page Content -->
        <div id="page-wrapper">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-12">
                        <div id="myDiagramDiv" style="width:800px; height:600px; background-color: #DAE4E4;"></div>
                    </div>
                    <!-- /.col-lg-12 -->
                </div>
                <!-- /.row -->
            </div>
            <!-- /.container-fluid -->
        </div>
        <!-- /#page-wrapper -->

    </div>
    <!-- /#wrapper -->

    <!-- jQuery -->
    <script src="../vendor/jquery/jquery.min.js"></script>

    <!-- Bootstrap Core JavaScript -->
    <script src="../vendor/bootstrap/js/bootstrap.min.js"></script>

    <!-- Metis Menu Plugin JavaScript -->
    <script src="../vendor/metisMenu/metisMenu.min.js"></script>

    <!-- Custom Theme JavaScript -->
    <script src="../dist/js/sb-admin-2.js"></script>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/gojs/1.8.9/go-debug.js"></script>
	
	<script>
	function init() {
	    if (window.goSamples) goSamples();  // init for these samples -- you don't need to call this
	    var gojs = go.GraphObject.make;  // for conciseness in defining templates in this function

	    myDiagram =
	      gojs(go.Diagram, "myDiagramDiv",  // must be the ID or reference to div
	        { initialContentAlignment: go.Spot.Center });

	    // define all of the gradient brushes
	    var graygrad = gojs(go.Brush, "Linear", { 0: "#F5F5F5", 1: "#F1F1F1" });
	    var bluegrad = gojs(go.Brush, "Linear", { 0: "#CDDAF0", 1: "#91ADDD" });
	    var yellowgrad = gojs(go.Brush, "Linear", { 0: "#FEC901", 1: "#FEA200" });
	    var lavgrad = gojs(go.Brush, "Linear", { 0: "#EF9EFA", 1: "#A570AD" });

	    // define the Node template for non-terminal nodes
	    myDiagram.nodeTemplate =
	      gojs(go.Node, "Auto",
	        { isShadowed: true },
	        // define the node's outer shape
	        gojs(go.Shape, "RoundedRectangle",
	          { fill: graygrad, stroke: "#D8D8D8" },
	          new go.Binding("fill", "color")),
	        // define the node's text
	        gojs(go.TextBlock,
	          { margin: 5, font: "bold 11px Helvetica, bold Arial, sans-serif" },
	          new go.Binding("text", "key"))
	      );

	    // define the Link template
	    myDiagram.linkTemplate =
	      gojs(go.Link,  // the whole link panel
	        { selectable: false },
	        gojs(go.Shape));  // the link shape

	    // create the model for the double tree
	    myDiagram.model = new go.TreeModel([
	        // these node data are indented but not nested according to the depth in the tree
	        { key: "Root", color: lavgrad },
	          { key: "Left1", parent: "Root", dir: "left", color: bluegrad },
	            { key: "leaf1", parent: "Left1" },
	            { key: "leaf2", parent: "Left1" },
	            { key: "Left2", parent: "Left1", color: bluegrad },
	              { key: "leaf3", parent: "Left2" },
	              { key: "leaf4", parent: "Left2" },
	          { key: "Right1", parent: "Root", dir: "right", color: yellowgrad },
	            { key: "Right2", parent: "Right1", color: yellowgrad },
	              { key: "leaf5", parent: "Right2" },
	              { key: "leaf6", parent: "Right2" },
	              { key: "leaf7", parent: "Right2" },
	            { key: "leaf8", parent: "Right1" },
	            { key: "leaf9", parent: "Right1" }
	      ]);

	    doubleTreeLayout(myDiagram);
	  }

	  function doubleTreeLayout(diagram) {
	    // Within this function override the definition of 'gojs' from jQuery:
	    var gojs = go.GraphObject.make;  // for conciseness in defining templates
	    diagram.startTransaction("Double Tree Layout");

	    // split the nodes and links into two Sets, depending on direction
	    var leftParts = new go.Set(go.Part);
	    var rightParts = new go.Set(go.Part);
	    separatePartsByLayout(diagram, leftParts, rightParts);
	    // but the ROOT node will be in both collections

	    // create and perform two TreeLayouts, one in each direction,
	    // without moving the ROOT node, on the different subsets of nodes and links
	    var layout1 =
	      gojs(go.TreeLayout,
	        { angle: 90,
	          arrangement: go.TreeLayout.ArrangementFixedRoots,
	          setsPortSpot: false });

	    var layout2 =
	      gojs(go.TreeLayout,
	        { angle: 90,
	          arrangement: go.TreeLayout.ArrangementFixedRoots,
	          setsPortSpot: false });

	    layout1.doLayout(leftParts);
	    layout2.doLayout(rightParts);

	    diagram.commitTransaction("Double Tree Layout");
	  }

	  function separatePartsByLayout(diagram, leftParts, rightParts) {
	    var root = diagram.findNodeForKey("Root");
	    if (root === null) return;
	    // the ROOT node is shared by both subtrees!
	    leftParts.add(root);
	    rightParts.add(root);
	    // look at all of the immediate children of the ROOT node
	    root.findTreeChildrenNodes().each(function(child) {
	        // in what direction is this child growing?
	        var dir = child.data.dir;
	        var coll = (dir === "left") ? leftParts : rightParts;
	        // add the whole subtree starting with this child node
	        coll.addAll(child.findTreeParts());
	        // and also add the link from the ROOT node to this child node
	        coll.add(child.findTreeParentLink());
	      });
	  }
	  
	  init();
	</script>
</body>

</html>
