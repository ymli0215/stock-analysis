	<script type="text/javascript">
		var year = 8;
		var items = ['ROE','EPS','每股淨值','營收年增','毛利率','營利率','淨利率',
			'流動比','速動比','負債比','現金流量比','營運現金流','投資現金流','自由現金流',
			'籌資現金流','稅後淨利','營運現金流/稅後淨利',
			'應收帳款','應收帳款(增加)減少','應收帳款/稅後淨利', '應收帳款周轉率', 
			'存貨','存貨(增加)減少','存貨/稅後淨利','存貨周轉率',
			'應付帳款','應付帳款增加(減少)'];
		//對應計算分數
		var cals = [1, 2, 3, -1, 4, 5, 6, 7 ,8 ,9, 10, -1 , -1, -1 , -1 , -1 , 11, -1, -1 , -1];
		//對應評分等級
		var levels = ['S+', 'S', 'S-', 'A+', 'A', 'A-', 'B+', 'B', 'B-', 'B-', 'B-'];
		
		var headerTh = "<th width='10%'>年報(百萬)</th><th width='5%'>評價</th><th width='5%'>平均</th>";
	
		resetMenu();
		initIds('ids');
		
		function printFincTable(id) {
			var url = 'https://stock.bignoodle.net/StockServer/stock/queryStockFinanData?si=' + id.toUpperCase() + '&c=' + year + '&callback=call2';
			//var url = 'http://localhost:8080/web/stock/queryStockTurnData?si=' + id.toUpperCase() + '&dt=' + dateType + '&dn=20&callback=call';
			
			return $.ajax({
		        url: url,
		        dataType: "jsonp",
		        jsonpCallback: "call2",
		        success: function (data) {
		        	$(".header2 th").remove();
		        	$("#tablebody2 tr").remove();
		        	
		        	var length = data.ratiosY.length;
		            var th = headerTh;
					for(i=0;i<length;i++) {
						th += "<th>" + data.ratiosY[i].id.time + "</th>";
					}
					$(".header2 tr").append(th);

					for(k=0;k<items.length;k++) {
						var tr = "<tr><td>" + items[k] + "</td>";
						if(cals[k] > 0) {
							tr += "<td>" + levels[data.calNums[cals[k]-1].level-1] + "</td>";
							tr += "<td>" + data.calNums[cals[k]-1].avg + "</td>";
						}
						else {
							tr += "<td></td><td></td>";
						}
						for(j=0;j<length;j++) {
							//roe
							if(k==0) {
								tr += "<td>" + data.ratiosY[j].val1 + "</td>";
							}
							//eps
							if(k==1) {
								tr += "<td>" + data.ratiosY[j].val5 + "</td>";
							}
							//每股淨值
							if(k==2) {
								tr += "<td>" + data.ratiosY[j].val4 + "</td>";
							}
							//營收年增
							if(k==3) {
								tr += "<td>" + data.ratiosY[j].val6 + "</td>";
							}
							//毛利率
							if(k==4) {
								tr += "<td>" + data.ratiosY[j].val2 + "</td>";
							}
							//營利率
							if(k==5) {
								tr += "<td>" + data.ratiosY[j].val12 + "</td>";
							}
							//淨利率
							if(k==6) {
								tr += "<td>" + data.ratiosY[j].val3 + "</td>";
							}
							//流動比
							if(k==7) {
								tr += "<td>" + data.ratiosY[j].val13 + "</td>";
							}
							//速動比
							if(k==8) {
								tr += "<td>" + data.ratiosY[j].val9 + "</td>";
							}
							//負債比
							if(k==9) {
								tr += "<td>" + data.ratiosY[j].val10 + "</td>";
							}
							//現金流量比
							if(k==10) {
								tr += "<td>" + data.ratiosY[j].val11 + "</td>";
							}
							//營運現金流
							if(k==11) {
								tr += "<td>" + data.flowsY[j].val4 + "</td>";
							}
							//投資現金流
							if(k==12) {
								tr += "<td>" + data.flowsY[j].val5 + "</td>";
							}
							//自由現金流
							if(k==13) {
								tr += "<td>" + (data.flowsY[j].val4 + data.flowsY[j].val5) + "</td>";
							}
							//籌資現金流
							if(k==14) {
								tr += "<td>" + data.flowsY[j].val6 + "</td>";
							}
							//稅後淨利
							if(k==15) {
								tr += "<td>" + data.ratiosY[j].val14 + "</td>";
							}
							//營運現金流/稅後淨利
							if(k==16) {
								tr += "<td>" + Math.round((data.flowsY[j].val4/data.ratiosY[j].val14)*100)/100 + "</td>";
							}
							//應收帳款
							if(k==17) {
								tr += "<td>" + data.sheetsY[j].val1 + "</td>";
							}
							//應收帳款(增加)減少
							if(k==18) {
								tr += "<td>" + data.flowsY[j].val1 + "</td>";
							}
							//應收帳款/稅後淨利
							if(k==19) {
								tr += "<td>" + Math.round((data.sheetsY[j].val1/data.ratiosY[j].val14)*100)/100 + "</td>";
							}
							//應收帳款周轉率
							if(k==20) {
								tr += "<td>" + data.ratiosY[j].val7 + "</td>";
							}
							//存貨
							if(k==21) {
								tr += "<td>" + data.sheetsY[j].val2 + "</td>";
							}
							//存貨(增加)減少
							if(k==22) {
								tr += "<td>" + data.flowsY[j].val2 + "</td>";
							}
							//存貨/稅後淨利
							if(k==23) {
								tr += "<td>" + Math.round((data.sheetsY[j].val2/data.ratiosY[j].val14)*100)/100 + "</td>";
							}
							//存貨周轉率
							if(k==24) {
								tr += "<td>" + data.ratiosY[j].val8 + "</td>";
							}
							//應付帳款
							if(k==25) {
								tr += "<td>" + data.sheetsY[j].val3 + "</td>";
							}
							//應付帳款增加(減少)
							if(k==26) {
								tr += "<td>" + data.flowsY[j].val3 + "</td>";
							}
						}
						tr += "</tr>";
						$("#tablebody2").append(tr);
					}
		        },
		        error: function (request,error) {
		            alert('發生錯誤，請晚點再試!'+error);
		        },
		        complete: function (request,textStatus) {
		        	$('#tab1').click();
		        }
		    });
		}
		
		function go(position) {
			var index = $("#ids").prop('selectedIndex');
			var max = $("#ids option").length;
			if(index + position <= 1) {
				index = 1; 
			}
			else if(index + position >= max) {
				index = max-1;
			}
			else {
				index = index + position;
			}
			var id = $('#ids option:eq(' + index + ')').val();
			$("#ids").val(id);
			$('#ids').selectpicker('refresh')
			printChartAll(0, id);
		}
		
		
		function printChart(dateType, id) {
			var url = 'https://stock.bignoodle.net/StockServer/stock/queryStockData?si=' + id.toUpperCase() + '&dt=' + dateType + '&dn=130&callback=call';
			//var url = 'http://localhost:8080/web/stock/queryStockTurnData?si=' + id.toUpperCase() + '&dt=' + dateType + '&dn=20&callback=call';
			
			return $.ajax({
		        url: url,
		        dataType: "jsonp",
		        jsonpCallback: "call",
		        success: function (data) {
		          var ema7 = new Array();
		          var ema13 = new Array();
		          var ema21 = new Array();
		          var ema53 = new Array();
		          for(var i=0;i<data.charts.length;i++) {
		          	if(data.charts[i].ema7>0)
		          		ema7.push([data.charts[i].dataTime, data.charts[i].ema7]);
		          	if(data.charts[i].ema13>0)
		          		ema13.push([data.charts[i].dataTime, data.charts[i].ema13]);
		          	if(data.charts[i].ema21>0)
		          		ema21.push([data.charts[i].dataTime, data.charts[i].ema21]);
		          	if(data.charts[i].ema53>0)
		          		ema53.push([data.charts[i].dataTime, data.charts[i].ema53]);
		          	
		          }
		          
		          var seriesEMAArray;
			        	seriesEMAArray = [{
			                type : 'candlestick',
			                name : data['sname'],
			                data : data['sdata']
			            }, {
			                type: 'column',
			                name: 'Volume',
			                data: data['vols'],
			                yAxis: 1
			            }, {
			                name: 'ema7',
			                data: ema7,
			                yAxis: 0
			            }, {
			                name: 'ema13',
			                data: ema13,
			                yAxis: 0
			            }, {
			                name: 'ema21',
			                data: ema21,
			                yAxis: 0
			            }, {
			                name: 'ema53',
			                data: ema53,
			                yAxis: 0
			            }];
			          
		          
		          
			        $('#' + dateType + 'container').highcharts('StockChart', {
			        	chart: {
			        		reflow: true,
			                height: 500
			            },
			            tooltip: {
		                	xDateFormat:'%Y-%m-%d',
		                	shared:true
			            },
			            colors: ['#058DC7', '#50B432', '#ED561B', '#CC7700', '#4f9ab7', '#64E572', 
			                     '#FF9655', '#FFF263', '#873322'],
			            plotOptions: {
			                candlestick: {
			                    color: '#005500',
			                    lineColor: '#005500',
			                    upColor: '#D52B00',
			                    upLineColor: '#D52B00'
			                },
			                column: {
			                    color: '#FF9900'
			                },
			                line: {
			                    lineWidth: 1,
			                    marker: { states: { hover: { enabled: false }, select: { enabled: false } } }
			                },
			                dataLabels: {
			                    enabled: false
			                }
			            },
			            rangeSelector : {
			                //selected : 1
			                //關閉左上方的zoom按鈕
			            	enabled: true,
			            	inputEnabled:false,
			            	buttonPosition: {
			            		align: 'right',
			            		x: 600,
