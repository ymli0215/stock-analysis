var dateTypeArray = ["D"];
function printChartAll(index, id) {
	//console.log("printChartAll " + dateTypeArray[index]);
	return printChart(dateTypeArray[index], id).then(function(data){
        if (index >= dateTypeArray.length) {
            return;
        } else {
        	if (index+1 >= dateTypeArray.length) {
        		return;
        	}
            return printChartAll(index + 1, id);
        }
    });
	
}


function queryChart() {
	if($("#ids").val() == '') {
		alert('請輸入要查詢的股票代碼');
		return;
	}
	printChartAll(0, $("#ids").val());
