	<script>
	resetMenu();
	
	function getDiffTr(data, target, index) {
		if(index == 0) {
			return "<td>--</td>";
		}
		var value = (data[target][index][1] - data[target][index-1][1]);
		if(value > 0) {
			value = "<font color=blue>" + value + "</font>";
		}
		else if(value < 0){
			value = "<font color=red>" + value + "</font>";
		}
		return "<td>" + value + "</td>";
	}
	
	var dateType = 'D';
	function printChart() {
		var url = 'https://stock.bignoodle.net/StockServer/futures/queryFuturesOpen2?dc=30&callback=call';
		//var url = 'http://localhost:8080/web/options/optionsopen?dc=50&callback=call';

	        url: url,
	        dataType: "jsonp",
	        jsonpCallback: "call",

	        	$.each(data['sdata'], function(index, value) {

	        			tr += $(".thead").html();
	        		}
	        		tr += "<tr>"
	        		
	        		tr += "<td>" + data['fos'][index].dataString + "</td>";
	        		//外資
	        		tr += "<td>" + data['values1'][index][1] + "</td>";
	        		tr += getDiffTr(data, "values1", index);
	        		//大外資
	        		tr += "<td>" + data['values2'][index][1] + "</td>";
	        		tr += getDiffTr(data, "values2", index);
	        		//小外資
	        		tr += "<td>" + data['values3'][index][1] + "</td>";
	        		tr += getDiffTr(data, "values3", index);
	        		//內資

	        		tr += getDiffTr(data, "values4", index);
	        		//GG
	        		tr += "<td>" + data['values5'][index][1] + "</td>";
	        		tr += getDiffTr(data, "values5", index);
	        		//遠外
	        		tr += "<td>" + data['values6'][index][1] + "</td>";
	        		tr += getDiffTr(data, "values6", index);
	        		//遠內
	        		tr += "<td>" + data['values7'][index][1] + "</td>";
	        		tr += getDiffTr(data, "values7", index);
	        		tr += "</tr>";
	        		
	        		$("#tablebody").append(tr);
	        	});
	        	
	            // create the chart
		        $('#Dcontainer').highcharts('StockChart', {
		        	chart: {

		            },
		            tooltip: {

		                     '#FF9655', '#FFF263', '#873322'],

function queryChart() {
