	<script>
	resetMenu();
	
	var dateType = 'D';
	function printChart() {
		var url = 'https://stock.bignoodle.net/StockServer/options/optionsopen?dc=100&callback=call';
		//var url = 'http://localhost:8080/web/options/optionsopen?dc=20&callback=call';
		
		return $.ajax({
	        url: url,
	        dataType: "jsonp",
	        jsonpCallback: "call",
	        success: function (data) {
	        	$("#tablebody").children("tr").remove();
	        	$.each(data['charts'], function(index, value) {
	        		var tr = "";
	        		if(index > 0 && index % 10 == 0) {
	        			tr += $(".thead").html();
	        		}
	        		tr += "<tr>";
	        		tr += "<td>" + value.dataString + "</td>";
	        		tr += "<td>" + value.bCallOI + "</td>";
	        		tr += "<td>" + value.bCallAvgPrice + "</td>";
	        		tr += "<td>" + value.bPutOI + "</td>";
	        		tr += "<td>" + value.bPutAvgPrice + "</td>";
	        		tr += "<td>" + value.bsDiffAmont + "</td>";
	        		tr += "</tr>";
	        		
	        		$("#tablebody").append(tr);
	        	});
	        	
	            // create the chart
		        $('#Dcontainer').highcharts('StockChart', {
		        	chart: {
		                 height: 600
		            },
		            tooltip: {
		            	xDateFormat:'%Y-%m-%d',shared:true
		            },
		            colors: ['#058DC7', '#50B432', '#ED561B', '#CC7700', '#4f9ab7', '#64E572', 
		                     '#FF9655', '#FFF263', '#873322'],
		            plotOptions: {
		                candlestick: {
		                    color: '#005500',
		                    lineColor: '#005500',
		                    upColor: '#D52B00',
		                    upLineColor: '#D52B00'
		                },
		                column: {
		                    color: '#FF9900'
		                },
		                line: {
		                    lineWidth: 2,
		                    marker: { states: { hover: { enabled: false }, select: { enabled: false } } }
		                },
		                dataLabels: {
		                    enabled: false
		                }
		            },
		            rangeSelector : {
		                //selected : 1
		                //關閉左上方的zoom按鈕
		            	enabled: false
		            },
		            title : {
		                text : data['sname']
		            },
		            yAxis: [{
		                height: 200,
		                opposite: true
		            }, {
		                top: 210,
		                height: 150
		            }, {
		                top: 370,
		                height: 150
		            }],
		            series : [{
		                type : 'candlestick',
		                name : data['sname'],
		                data : data['sdata']
		            },{
		                name : '買權未平倉量',
		                data : data['bCallOI'],
		                color: '#058DC7',
		                yAxis: 2
		            },{
		                name : '買權未平倉均價',
		                data : data['bCallAvgPrice'],
		                color: '#873322',
		                yAxis: 1
		            },{
		                name : '賣權未平倉量',
		                data : data['bPutOI'],
		                color: '#FFF263',
		                yAxis: 2
		            },{
		                name : '賣權未平倉均價',
		                data : data['bPutAvgPrice'],
		                color: '#FF9655',
		                yAxis: 1
		            }]
		        });
	        },
	        error: function (request,error) {
	            alert('發生錯誤，請晚點再試!'+error);
	        },
	        complete: function (request,textStatus) {
	        }
	    });
	}

function queryChart() {
printChart();
}
	</script>
