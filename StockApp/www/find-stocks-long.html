	<script type="text/javascript">
		resetMenu();
		function printHLSingal(value) {
			if(value) {
				return "＊＊";
			}
			return "";
		}
		function call(data) {
			$("#stockTable").find(".dataTr").remove();
	    	var index = 0;
	    	var table = "";
	    	$.each(data, function(index, stock) {
	    		var tr = "<tr class='dataTr'>";
	    		tr += "<td>" + (index+1) + "</td><td>" + stock.stockId + "</td><td>" + stock.stockName + "</td>" + 
	    			"<td>" + printHLSingal(stock.high233) + "</td>" +
	    			"<td>" + printHLSingal(stock.high144) + "</td>" +
	    			"<td>" + printHLSingal(stock.high89) + "</td>" +
	    			"<td>" + printHLSingal(stock.high55) + "</td>" +
	    			"<td>" + printHLSingal(stock.high34) + "</td>"+
	    			"<td>" + printHLSingal(stock.high21) + "</td>"+
	    			"<td>" + printHLSingal(stock.high13) + "</td>"+
	    			"<td>" + printHLSingal(stock.high8) + "</td>"+
	    			"<td>" + printHLSingal(stock.high5) + "</td>"+
	    			"<td>" + printHLSingal(stock.high3) + "</td>"+
	    			"<td>" + printHLSingal(stock.low3) + "</td>"+
	    			"<td>" + printHLSingal(stock.low5) + "</td>"+
	    			"<td>" + printHLSingal(stock.low8) + "</td>"+
	    			"<td>" + printHLSingal(stock.low13) + "</td>"+
	    			"<td>" + printHLSingal(stock.low21) + "</td>"+
	    			"<td>" + printHLSingal(stock.low34) + "</td>"+
	    			"<td>" + printHLSingal(stock.low55) + "</td>"+
	    			"<td>" + printHLSingal(stock.low89) + "</td>"+
	    			"<td>" + printHLSingal(stock.low144) + "</td>"+
	    			"<td>" + printHLSingal(stock.low233) + "</td>";
	    		tr += "</tr>";
	        	$("#stockTable").append(tr);
	    		
	    		//table += "<td><button onclick='printChart(\"" + dateType + "\", \"" + stock.stockId + "\")'>" + stock.stockId + "-" + stock.stockName + "</button></td>";
	    		index++;
	        });
	    	$('#tab1').click();
		}
		//查詢多空股票
		function findStocks() {
			if($('input[name="highlow"]:checked').length == 0) {
				alert("高於、低於至少選擇一種");
				return ;
			}
			if($('input[name="matype"]:checked').length == 0) {
				alert("均線至少選擇一種");
				return ;
			}
			var checkboxValues1 = "";
			$('input[name="highlow"]:checked').each(function(index, value) {
				if(index > 0) {
	            	checkboxValues1+=",";
	            }
				checkboxValues1 += $(this).val();
			});
			var checkboxValues2 = "";
			$('input[name="matype"]:checked').each(function(index, value) {
				if(index > 0) {
					checkboxValues2+=",";
	            }
				checkboxValues2 += $(this).val();
			});
			
			
			var url = 'https://stock.bignoodle.net/StockServer/stock/findStockLongTerm?callback=call';
			//var url = 'http://localhost:8080/web/stock/findStockLongTerm';
			
			$.ajax({
		        url: url,
		        dataType: "jsonp",
		        data: {
		        	'highlow': $("input[name=highlow]:checked").val(),
		        	'matype': $("input[name=matype]:checked").val()
		        },
		        jsonpCallback: "call",
		        error: function (request,error) {
		            alert('發生錯誤，請晚點再試!'+error);
		        }
		    });
		}
		</script>
